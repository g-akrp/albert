# Albert load-test result stack: InfluxDB 1.8 (k6 metrics sink) + Grafana (dashboards).
# Usage: `albert stack up` (podman-compose) or `albert stack up --engine docker`.
# Then run a sim with:  albert run <sim>.abl --influx http://localhost:8086/k6
services:
  influxdb:
    image: docker.io/library/influxdb:1.8
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
    volumes:
      - influx-data:/var/lib/influxdb

  grafana:
    image: docker.io/grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_BASIC_ENABLED: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - influxdb

volumes:
  influx-data:
